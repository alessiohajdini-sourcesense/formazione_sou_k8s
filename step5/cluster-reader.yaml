apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-reader
  namespace: formazione-sou
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-reader
  namespace: formazione-sou
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-reader-binding
  namespace: formazione-sou
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-reader
subjects:
  - kind: ServiceAccount
    name: cluster-reader
    namespace: formazione-sou