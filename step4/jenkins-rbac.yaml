apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: formazione-sou
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-deploy
  namespace: formazione-sou
rules:
  - apiGroups: ["", "apps",]
    resources: ["pods", "services", "configmaps", "secrets", "deployments", "replicasets",]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deploy-binding
  namespace: formazione-sou
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-deploy
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: formazione-sou