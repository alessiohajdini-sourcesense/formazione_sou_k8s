apiVersion: v1
kind: Service
metadata:
  name: {{ include "mia-app.fullname" . }}
  labels:
    {{- include "mia-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
  selector:
    {{- include "mia-app.selectorLabels" . | nindent 4 }}
